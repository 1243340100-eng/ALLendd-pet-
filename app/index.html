<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Framework</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="stage" aria-label="Pet Framework desktop pet">
      <div id="bubble" class="bubble hidden">该喝水啦</div>
      <div id="frameworkNotice" class="framework-notice hidden">
        桌宠框架测试版<br>
        请替换动画资产和角色配置
      </div>
      <div id="reminderStack" class="reminder-stack" aria-label="提醒与计划堆叠">
        <div id="reminderBubble" class="reminder-bubble hidden" role="alert" aria-label="提醒"></div>
        <div id="planningBubble" class="reminder-bubble reminder-bubble--planning hidden" role="region" aria-label="今日计划">
          <div class="plan-bubble__header">
            <strong class="plan-bubble__title">今日计划</strong>
            <button id="planBubbleMinimize" type="button" class="plan-bubble__minimize" aria-label="最小化计划">−</button>
          </div>
          <div id="planBubbleTimeline" class="plan-bubble__timeline"></div>
        </div>
        <button id="planBubbleRestore" class="plan-bubble__restore hidden" type="button" aria-label="恢复今日计划">📝 今日计划</button>
      </div>
      <div id="pet" class="pet" role="img" aria-label="Pet"></div>
      <div id="controls" class="controls">
        <button id="apiSettings" type="button">接口</button>
        <button id="chatToggle" type="button">聊天</button>
        <button id="stateToggle" type="button">状态</button>
        <button id="languageToggle" type="button">中 / EN</button>
      </div>

      <section id="apiPanel" class="api-panel hidden" aria-label="API 设置">
        <div class="api-panel__head">
          <strong>API 设置</strong>
          <button id="apiClose" type="button" aria-label="关闭 API 设置">&#x00D7;</button>
        </div>
        <label>
          <span>接口地址</span>
          <input id="apiEndpoint" type="text" autocomplete="off">
        </label>
        <label>
          <span>模型</span>
          <input id="apiModel" type="text" autocomplete="off">
        </label>
        <label>
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>
        <label>
          <span id="drinkReminderLabel">喝水提醒词</span>
          <input id="drinkReminderText" type="text" autocomplete="off" maxlength="120">
        </label>
        <label>
          <span id="nightReminderLabel">晚安提醒词</span>
          <input id="nightReminderText" type="text" autocomplete="off" maxlength="120">
        </label>
        <div id="apiStatus" class="api-status"></div>
        <div class="api-actions">
          <button id="apiClearKey" type="button">清空</button>
          <button id="apiSave" type="button">保存</button>
        </div>
      </section>

      <section id="chatPanel" class="chat-panel hidden" aria-label="Pet Framework 聊天">
        <div class="chat-panel__head">
          <strong id="chatPanelTitle">聊天</strong>
          <div class="chat-panel__actions">
            <button id="planModeToggle" type="button" class="chat-panel__plan-btn" aria-label="进入计划模式">📝 计划</button>
            <button id="chatClose" type="button" aria-label="关闭聊天">&#x00D7;</button>
          </div>
        </div>
        <div id="chatLog" class="chat-log"></div>
        <div id="planningView" class="planning-view hidden">
          <div class="planning-view__intro">
            <span class="planning-view__icon" aria-hidden="true">🎯</span>
            <p>告诉我今天的目标，我来帮你拆成带时间的任务表。</p>
          </div>
          <div id="planningConversation" class="planning-conversation"></div>
          <div id="planningDraft" class="planning-draft hidden">
            <div class="planning-draft__meta">
              <span class="planning-draft__date" id="planningDraftDate"></span>
              <span class="planning-draft__badge">草案</span>
            </div>
            <div id="planningDraftTasks" class="planning-draft__tasks"></div>
          </div>
          <div id="planningActions" class="planning-actions hidden">
            <button id="confirmPlanBtn" type="button" class="planning-actions__confirm">✅ 确认计划</button>
            <div class="planning-revise">
              <input id="revisePlanInput" type="text" autocomplete="off" maxlength="200" placeholder="哪些部分需要调整？">
              <button id="revisePlanBtn" type="button" class="planning-actions__revise">🔄 重新生成</button>
            </div>
          </div>
        </div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" autocomplete="off" maxlength="300" placeholder="和 Pet 说点什么...">
          <button id="chatSend" type="submit">发送</button>
        </form>
      </section>

      <section id="statePanel" class="state-panel hidden" aria-label="Pet Framework 状态与记忆">
        <div class="state-panel__head">
          <strong>状态</strong>
          <button id="stateClose" type="button" aria-label="关闭状态">&#x00D7;</button>
        </div>
        <div id="stateStatus" class="state-status">加载中...</div>
        <section class="state-block">
          <h2>Agent 架构状态</h2>
          <div id="archStatusView" class="state-kv">加载中...</div>
        </section>
        <section class="state-block">
          <h2>PlanningGraph 模型</h2>
          <div id="planningModelView" class="state-kv">未调用</div>
        </section>
        <section class="state-block">
          <div class="state-block__head">
            <h2>提醒与日程</h2>
            <button id="refreshReminders" type="button">刷新</button>
          </div>
          <div id="reminderList" class="memory-list"></div>
          <div class="state-block__head" style="margin-top:8px">
            <button id="triggerDailyDigest" type="button">生成今日摘要</button>
            <button id="triggerReminderCheck" type="button">检查到期提醒</button>
          </div>
        </section>
        <section class="state-block">
          <h2>好感度</h2>
          <div id="affectionView" class="state-kv"></div>
        </section>
        <section class="state-block">
          <h2>Prompt 统计</h2>
          <div id="promptStatsView" class="state-kv"></div>
        </section>
        <section class="state-block">
          <div class="state-block__head">
            <h2>用户记忆 <small style="font-weight:normal;color:#888">SQLite</small></h2>
            <button id="clearUserMemory" type="button">清空</button>
          </div>
          <div id="userMemoryList" class="memory-list"></div>
        </section>
        <section class="state-block">
          <div class="state-block__head">
            <h2>长期记忆 <small style="font-weight:normal;color:#888">SQLite</small></h2>
            <button id="clearLongTermMemory" type="button">清空</button>
          </div>
          <div id="longTermMemoryList" class="memory-list"></div>
        </section>
        <section class="state-block">
          <div class="state-block__head">
            <h2>短期记忆 <small style="font-weight:normal;color:#888">SQLite</small></h2>
            <button id="clearShortTermMemory" type="button">清空</button>
            <button id="clearExpiredShortTerm" type="button">清理过期</button>
          </div>
          <p id="shortTermMemoryNote" class="memory-note">
            短期记忆用于临时上下文，普通聊天不会自动保存到这里。数据存储于 SQLite。
          </p>
          <div id="shortTermMemoryList" class="memory-list"></div>
        </section>
        <div class="state-danger">
          <button id="exportMemory" type="button">导出个人数据</button>
          <button id="clearAllMemory" type="button">清空全部记忆</button>
        </div>
      </section>
      <section id="onboardingPanel" class="state-panel onboarding-panel hidden" aria-label="首次配置">
        <div class="state-panel__head onboarding-panel__head">
          <div class="onboarding-panel__title">
            <span class="onboarding-panel__icon" aria-hidden="true">✨</span>
            <strong>首次配置</strong>
          </div>
        </div>
        <div id="onboardingMessage" class="state-status onboarding-panel__lead"></div>
        <form id="onboardingForm" class="state-block onboarding-form">
          <div class="onboarding-form__section">
            <label class="onboarding-form__field">
              <span>昵称</span>
              <input id="obNickname" type="text" placeholder="你的名字" />
            </label>
            <label class="onboarding-form__field">
              <span>称呼</span>
              <input id="obPreferredName" type="text" placeholder="角色对你的称呼" />
            </label>
          </div>
          <div class="onboarding-form__section onboarding-form__section--inline">
            <label class="onboarding-form__field">
              <span>回复长度</span>
              <select id="obReplyLength">
                <option value="short">简短</option>
                <option value="medium">适中</option>
                <option value="long">详细</option>
              </select>
            </label>
            <label class="onboarding-form__field">
              <span>主动程度</span>
              <select id="obProactiveLevel">
                <option value="low">低</option>
                <option value="medium" selected>中</option>
                <option value="high">高</option>
              </select>
            </label>
          </div>
          <div class="onboarding-form__section">
            <label class="onboarding-form__field">
              <span>天气城市</span>
              <input id="obWeatherCity" type="text" placeholder="如 上海" />
            </label>
          </div>
          <div class="onboarding-form__section onboarding-form__toggles">
            <label class="onboarding-form__toggle">
              <input id="obWeatherEnabled" type="checkbox" />
              <span class="onboarding-form__toggle-track"></span>
              <span class="onboarding-form__toggle-label">允许联网查询该城市天气</span>
            </label>
            <label class="onboarding-form__toggle">
              <input id="obDndEnabled" type="checkbox" checked />
              <span class="onboarding-form__toggle-track"></span>
              <span class="onboarding-form__toggle-label">启用勿扰 (22:00-08:00)</span>
            </label>
            <label class="onboarding-form__toggle">
              <input id="obNotificationEnabled" type="checkbox" />
              <span class="onboarding-form__toggle-track"></span>
              <span class="onboarding-form__toggle-label">启用系统通知</span>
            </label>
            <label class="onboarding-form__toggle">
              <input id="obSoundEnabled" type="checkbox" />
              <span class="onboarding-form__toggle-track"></span>
              <span class="onboarding-form__toggle-label">启用通知声音</span>
            </label>
            <label class="onboarding-form__toggle">
              <input id="obMemoryEnabled" type="checkbox" checked />
              <span class="onboarding-form__toggle-track"></span>
              <span class="onboarding-form__toggle-label">启用记忆</span>
            </label>
          </div>
          <div class="onboarding-form__actions">
            <button type="submit" class="onboarding-form__submit">完成配置</button>
          </div>
        </form>
      </section>
    </main>
    <script src="./config/pet-profile.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
